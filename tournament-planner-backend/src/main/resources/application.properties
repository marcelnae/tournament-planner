spring.application.name=tournament-backend
server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://localhost:5432/tournament-planner
spring.datasource.username=root
spring.datasource.password=root

# Enable debug logging for troubleshooting
logging.level.org.springdoc=TRACE
logging.level.org.springframework.web=TRACE

# Ensure springdoc is enabled (default is true, but explicit for clarity)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# With context-path set, Swagger UI is available at /api/swagger-ui/index.html
# Example: http://localhost:8080/api/swagger-ui/index.html
